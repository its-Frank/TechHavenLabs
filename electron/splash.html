<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 480px; height: 300px;
      background: #0d0d1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-app-region: drag;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      -webkit-app-region: drag;
    }
    .logo {
      width: 72px; height: 72px;
      border-radius: 18px;
      box-shadow: 0 0 40px rgba(139,92,246,0.5);
    }
    .title {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #8b5cf6, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1px;
    }
    .progress-track {
      width: 200px;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #8b5cf6, #06b6d4);
      border-radius: 2px;
      animation: load 2.5s ease-in-out forwards;
    }
    @keyframes load {
      0%   { width: 0%; }
      60%  { width: 80%; }
      100% { width: 100%; }
    }
    .skip {
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      cursor: pointer;
      -webkit-app-region: no-drag;
      border: none;
      background: none;
      padding: 4px 8px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    .skip:hover { color: rgba(255,255,255,0.5); }
  </style>
</head>
<body>
  <div class="container">
    <img class="logo" src="../assets/icon-256.png" alt="logo" onerror="this.style.display='none'">
    <div class="title">Unified Comms</div>
    <div class="subtitle">Loading your workspace…</div>
    <div class="progress-track"><div class="progress-bar"></div></div>
    <button class="skip" onclick="done()">Skip</button>
  </div>
  <script>
    const { ipcRenderer } = require('electron');
    function done() { ipcRenderer.send('splash-done'); }
    // Auto-dismiss after animation finishes
    setTimeout(done, 2800);
  </script>
</body>
</html>
