<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 360px;
      height: 180px;
      overflow: hidden;
      background: #1e1f2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      user-select: none;
      -webkit-app-region: no-drag;
    }
    #toast {
      width: 360px;
      height: 180px;
      background: #1e1f2e;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 14px 16px 10px 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.8);
      position: relative;
      cursor: pointer;
      opacity: 0;
      transform: translateX(20px);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    #toast.visible {
      opacity: 1;
      transform: translateX(0);
    }
    /* Row 1: icon + service name */
    .row-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .service-icon-wrap {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
      background: #2a2b3d;
    }
    .service-icon-wrap img {
      width: 20px;
      height: 20px;
      object-fit: contain;
    }
    .service-name {
      font-size: 14px;
      font-weight: 700;
      color: #ffffff;
    }
    /* Row 2: sender → receiver */
    .row-route {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }
    .route-box {
      background: #2e3050;
      border-radius: 5px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 600;
      color: #a8b4ff;
      max-width: 130px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .route-arrow {
      color: rgba(255,255,255,0.35);
      font-size: 12px;
      flex-shrink: 0;
    }
    /* Row 3: message body */
    .row-body {
      font-size: 12px;
      color: #c8cde8;
      line-height: 1.4;
      margin-bottom: 6px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    /* Row 4: unread count */
    .row-unread {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      background: rgba(255,255,255,0.07);
      border-radius: 4px;
      padding: 2px 7px;
      display: inline-block;
    }
    /* Progress bar */
    .progress-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: #5865f2;
      border-radius: 0 0 12px 12px;
      transform-origin: left center;
      animation: shrink 5s linear forwards;
    }
    @keyframes shrink {
      from { transform: scaleX(1); }
      to   { transform: scaleX(0); }
    }
  </style>
</head>
<body>
  <div id="toast">
    <div class="row-header">
      <div class="service-icon-wrap">
        <img id="svc-icon" src="" alt="">
      </div>
      <span id="svc-name" class="service-name"></span>
    </div>
    <div class="row-route" id="route-row">
      <span id="route-sender" class="route-box"></span>
      <span class="route-arrow">⇒</span>
      <span id="route-receiver" class="route-box"></span>
    </div>
    <div id="msg-body" class="row-body"></div>
    <div id="unread-count" class="row-unread"></div>
    <div class="progress-bar" id="progress-bar"></div>
  </div>
  <script>
    const { ipcRenderer } = require('electron');

    ipcRenderer.on('toast-data', (event, data) => {
      document.getElementById('svc-icon').src = data.iconPath || '';
      document.getElementById('svc-name').textContent = data.serviceName || '';

      const routeRow = document.getElementById('route-row');
      if (data.sender) {
        document.getElementById('route-sender').textContent = data.sender;
        document.getElementById('route-receiver').textContent = data.receiver || 'You';
        routeRow.style.display = 'flex';
      } else {
        routeRow.style.display = 'none';
      }

      document.getElementById('msg-body').textContent = data.body || '';

      const unreadEl = document.getElementById('unread-count');
      if (data.unreadCount > 0) {
        unreadEl.textContent = data.unreadCount + ' unread message' + (data.unreadCount > 1 ? 's' : '');
        unreadEl.style.display = 'inline-block';
      } else {
        unreadEl.style.display = 'none';
      }

      // Restart progress bar
      const bar = document.getElementById('progress-bar');
      bar.style.animation = 'none';
      void bar.offsetWidth;
      bar.style.animation = 'shrink 5s linear forwards';

      // Slide in
      const toast = document.getElementById('toast');
      toast.classList.remove('visible');
      void toast.offsetWidth;
      toast.classList.add('visible');
    });

    document.getElementById('toast').addEventListener('click', () => {
      ipcRenderer.send('toast-clicked');
    });
  </script>
</body>
</html>
